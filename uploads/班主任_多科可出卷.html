<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>老師端 Demo</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f7f6;color:#262626}.app{display:grid;grid-template-columns:220px 1fr;min-height:680px}.side{background:#262626;color:#fff;padding:22px 18px}.brand{font-size:18px;font-weight:800;margin-bottom:24px}.nav{display:grid;gap:8px}.nav div{padding:11px 12px;border-radius:10px;color:#d4d4d4;font-size:14px}.nav div.on{background:#ca413b;color:#fff}.main{padding:24px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.title{font-size:22px;font-weight:800}.sub{font-size:13px;color:#737373;margin-top:4px}.btn{background:#ca413b;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:700}.grid{display:grid;grid-template-columns:1.25fr .75fr;gap:16px}.card{background:#fff;border:1px solid #ececea;border-radius:16px;padding:18px;box-shadow:0 8px 22px rgba(0,0,0,.04)}.card h3{margin:0 0 14px;font-size:16px}.row{display:flex;align-items:center;justify-content:space-between;border-top:1px solid #f0f0ef;padding:13px 0;font-size:14px}.row:first-of-type{border-top:0}.pill{font-size:12px;border-radius:999px;padding:5px 9px;background:#f2ded6;color:#ca413b;font-weight:700}.ok{background:#e9f7ef;color:#18794e}.warn{background:#fff5d6;color:#8a5a00}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}.stat{background:#fff;border:1px solid #ececea;border-radius:14px;padding:14px}.num{font-size:26px;font-weight:900;color:#ca413b}.label{font-size:12px;color:#737373;margin-top:4px}.paper{display:grid;gap:10px}.paper div{display:flex;justify-content:space-between;padding:12px;border-radius:12px;background:#fafaf9}.muted{color:#737373}.ai{background:#3f1210;color:#fff;border-radius:16px;padding:18px;margin-top:16px}.ai h3{margin:0 0 10px}.ai p{margin:0;color:#f4d9d7;line-height:1.7;font-size:14px}@media(max-width:760px){.app{grid-template-columns:1fr}.side{display:none}.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="brand">EXAMPRO</div><div class="nav"><div class="on">線上出卷</div><div>考試設定</div><div>AI 批改</div><div>成績分析</div><div>班級管理</div></div></aside>
  <main class="main">
    <div class="top"><div><div class="title">老師端・從出卷到看懂全班</div><div class="sub">國文｜高三甲班｜總複習第一次段考</div></div><button class="btn">建立新試卷</button></div>
    <section class="stats"><div class="stat"><div class="num">32</div><div class="label">已指派學生</div></div><div class="stat"><div class="num">29</div><div class="label">已完成作答</div></div><div class="stat"><div class="num">86%</div><div class="label">平均答對率</div></div></section>
    <section class="grid">
      <div class="card"><h3>試卷清單</h3><div class="paper"><div><strong>普高國文・桃花源記</strong><span class="pill ok">已發布</span></div><div><strong>樂府古詩選閱讀測驗</strong><span class="pill warn">批改中</span></div><div><strong>國字注音非選題</strong><span class="pill">AI 初評</span></div></div><div class="ai"><h3>AI 批改建議</h3><p>文意掌握正確，第二段論述稍嫌簡略。建議補充具體例證，老師可一鍵套用分數與評語。</p></div></div>
      <div class="card"><h3>班級弱點</h3><div class="row"><span>第三課：樂府古詩選</span><strong>58%</strong></div><div class="row"><span>非選題・國字注音</span><strong>45%</strong></div><div class="row"><span>文意判讀</span><strong>72%</strong></div><div class="row"><span class="muted">建議補強</span><span class="pill">生成講義</span></div></div>
    </section>
  </main>
</div>
<script>
function showPaperList(){return true}
</script>
</body>
</html>
