<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EXAMPRO 考測平台</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #ffffff; color: #262626; overflow: hidden; }
    #loader { position: fixed; inset: 0; display: grid; place-items: center; background: #fff; z-index: 2; transition: opacity .45s ease, visibility .45s ease; }
    #loader.hide { opacity: 0; visibility: hidden; }
    .mark { width: min(320px, 72vw); text-align: center; }
    .brand { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .logo { width: 46px; height: 46px; border-radius: 14px; display: grid; place-items: center; background: #ca413b; color: #fff; font-weight: 900; font-size: 24px; }
    .name { text-align: left; }
    .name strong { display: block; font-size: 22px; letter-spacing: .02em; }
    .name span { display: block; margin-top: 2px; font-size: 13px; color: #737373; }
    .bar { width: 100%; height: 3px; border-radius: 999px; background: #f2ded6; overflow: hidden; }
    .bar::before { content: ""; display: block; width: 38%; height: 100%; border-radius: inherit; background: #ca413b; animation: load 1.15s ease-in-out infinite; }
    .hint { margin-top: 16px; font-size: 13px; color: #737373; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; opacity: 0; transition: opacity .45s ease; background: #fff; }
    iframe.ready { opacity: 1; }
    @keyframes load { 0% { transform: translateX(-100%); } 50% { transform: translateX(85%); } 100% { transform: translateX(265%); } }
  </style>
</head>
<body>
  <div id="loader" aria-live="polite">
    <div class="mark">
      <div class="brand">
        <div class="logo">龍</div>
        <div class="name"><strong>EXAMPRO</strong><span>考測平台</span></div>
      </div>
      <div class="bar"></div>
      <div class="hint">正在準備 Demo...</div>
    </div>
  </div>
  <iframe id="app" src="app.html?v=3" title="EXAMPRO 考測平台"></iframe>
  <script>
    const frame = document.getElementById('app');
    const loader = document.getElementById('loader');
    let shown = false;
    function reveal() {
      if (shown) return;
      shown = true;
      frame.classList.add('ready');
      loader.classList.add('hide');
      setTimeout(() => loader.remove(), 700);
    }
    function isReady() {
      try {
        const doc = frame.contentDocument;
        const text = doc && doc.body ? doc.body.innerText : '';
        return text.includes('讓老師把時間留在教學') || text.includes('EXAMPRO') || text.includes('全真模擬測驗平台');
      } catch (e) { return false; }
    }
    const started = Date.now();
    const timer = setInterval(() => {
      if (isReady() || Date.now() - started > 12000) {
        clearInterval(timer);
        reveal();
      }
    }, 120);
    frame.addEventListener('load', () => setTimeout(() => { if (isReady()) reveal(); }, 200));
  </script>
</body>
</html>
